name: Build Executables

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev pkg-config libgl1-mesa-dev libgles2-mesa-dev python3-setuptools libgstreamer1.0-dev git-core gstreamer1.0-plugins-{bad,base,good,ugly} gstreamer1.0-alsa python3-dev libmtdev-dev xclip xsel libjpeg-dev

    - name: Install System Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install pkg-config sdl2 sdl2_image sdl2_ttf sdl2_mixer gstreamer

    - name: Install Windows Specific Dependencies
      if: runner.os == 'Windows'
      run: |
        pip install kivy_deps.sdl2 kivy_deps.glew

    - name: Install Python Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install maturin pyinstaller zeroconf
        pip install "kivy[base]"

    - name: Build Rust Crypto Backend
      shell: bash
      run: |
        cd crypto_rust
        maturin build --release
        pip install target/wheels/*.whl
        cd ..

    - name: Build PyInstaller Executable
      shell: bash
      run: |
        pyinstaller zevy.spec --noconfirm

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zevy-${{ runner.os }}
        path: dist/zevy/

  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev zlib1g-dev openjdk-17-jdk unzip zip autoconf libtool pkg-config cmake

    - name: Install Buildozer & Cython
      run: |
        python -m pip install --upgrade pip setuptools wheel cython
        pip install buildozer

    - name: Build with Buildozer
      run: |
        buildozer android debug

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zevy-Android-APK
        path: bin/*.apk
